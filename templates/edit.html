<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Feature — DeadlockDrop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">DEADLOCK<span>DROP</span></div>
    <nav>
  <a href="/">Home</a>
  <a href="/requests">Requests</a>
  <a href="/roadmap">Roadmap</a>
  <a href="/about">About</a>
  {% if session.username == 'admin' %}
    <a href="/admin">Admin</a>
  {% endif %}
  {% if session.username %}
    <a href="/profile">{{ session.username }}</a>
    <a href="/logout">Logout</a>
  {% else %}
    <a href="/login">Login</a>
    <a href="/register">Register</a>
  {% endif %}
</nav>
  </header>
  <div class="feature-detail">
    <a href="/admin" class="back-link">← Back to admin</a>
    <h1 style="font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #e8d5b8; letter-spacing: 2px; margin: 16px 0;">EDIT FEATURE</h1>
    <div class="auth-card">
      <form action="/edit/{{ feature.id }}" method="POST" class="auth-form">
        <input type="text" name="title" value="{{ feature.title }}" required />
        <textarea name="description" style="background:#1a1712; border:1px solid #3a3228; border-radius:2px; padding:10px 14px; color:#c9bfb0; font-family:'Inter',sans-serif; font-size:13px; outline:none; resize:vertical; min-height:100px;">{{ feature.description }}</textarea>
        <select name="category" style="background:#1a1712; border:1px solid #3a3228; border-radius:2px; padding:10px 14px; color:#c9bfb0; font-family:'IBM Plex Mono',monospace; font-size:12px; outline:none;">
          <option value="heroes" {% if feature.category == 'heroes' %}selected{% endif %}>Heroes</option>
          <option value="mechanics" {% if feature.category == 'mechanics' %}selected{% endif %}>Mechanics</option>
          <option value="ranked" {% if feature.category == 'ranked' %}selected{% endif %}>Ranked</option>
          <option value="map" {% if feature.category == 'map' %}selected{% endif %}>Map</option>
          <option value="items" {% if feature.category == 'items' %}selected{% endif %}>Items</option>
          <option value="ui/ux" {% if feature.category == 'ui/ux' %}selected{% endif %}>UI/UX</option>
          <option value="general" {% if feature.category == 'general' %}selected{% endif %}>General</option>
        </select>
        <button type="submit">Save Changes</button>
      </form>
    </div>
  </div>
</body>
</html>
