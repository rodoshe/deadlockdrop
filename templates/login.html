<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login — DeadlockDrop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">DEADLOCK<span>DROP</span></div>
    <nav>
      <a href="/">Home</a>
      <a href="/requests">Requests</a>
      <a href="/roadmap">Roadmap</a>
      <a href="/about">About</a>
      {% if session.username == 'admin' %}
        <a href="/admin">Admin</a>
      {% endif %}
      {% if session.username %}
        <a href="/profile">{{ session.username }}</a>
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      {% endif %}
    </nav>
  </header>
  <div class="auth-page">
    <div class="auth-card">
      <h1>LOGIN</h1>
      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
      <form action="/login" method="POST" class="auth-form">
        <input type="text" name="username" placeholder="Username" required />
        <div style="position: relative; width: 100%;">
          <input type="password" name="password" placeholder="Password" required id="password" style="width: 100%; padding-right: 56px;" />
          <span onclick="togglePassword('password')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #5a5040; user-select: none;">👁</span>
        </div>
        <button type="submit">Login</button>
      </form>
      <p class="auth-switch" style="margin-top: 10px;">
        <a href="/forgot" style="color: #5a5040; font-size: 11px;">Forgot your password?</a>
      </p>
      <p class="auth-switch">No account? <a href="/register">Register here</a></p>
    </div>
  </div>

  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }
  </script>
</body>
</html>
